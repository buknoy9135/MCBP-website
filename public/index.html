    <script>
      // Restore the original path after GitHub 404 redirect
      (function () {
        const params = new URLSearchParams(window.location.search);
        const path = params.get("p");
        if (path) {
          window.history.replaceState(null, null, path);
        }
      })();
    </script>
    <script>
      // Fix Supabase OAuth / invite links with HashRouter on GitHub Pages
      (function () {
        const hash = window.location.hash;
        const path = window.location.pathname;

        // Supabase sends: /auth/callback#access_token=...
        if (path === "/auth/callback" && hash.includes("access_token")) {
          const newUrl = "/#"+path + hash;
          window.location.replace(newUrl);
        }
      })();
    </script>
