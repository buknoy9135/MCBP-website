<!DOCTYPE html>
<html>
  <head>
    <meta charset="utf-8" />
    <script>
      // When GitHub Pages can't find a file,
      // redirect back to index.html but keep the path
      var path = window.location.pathname;
      var query = window.location.search;
      var hash = window.location.hash;

      window.location.replace(
        "/" + "?p=" + encodeURIComponent(path + query + hash)
      );
    </script>
  </head>
  <body></body>
</html>
